services:
  app:
    build:
      context: .
      args:
        # Public (shipped to browser) — safe as build args.
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME}
        NEXT_PUBLIC_DEMO_MODE: ${NEXT_PUBLIC_DEMO_MODE}
      # NEXT_SERVER_ACTIONS_ENCRYPTION_KEY is wired in via BuildKit secret so it
      # never lands in image layers / `docker history`. The Dockerfile consumes
      # it inside the `RUN --mount=type=secret,id=nextsa_key` build step.
      secrets:
        - nextsa_key
    restart: unless-stopped
    # Runtime env (including the encryption key again for runtime use, plus
    # SUPABASE_SERVICE_ROLE_KEY, JWT signing secret, etc.) comes from .env.local.
    env_file: .env.local
    # Bind only to loopback: the public internet reaches the app through
    # Caddy (on the docker network as `app:3000`), never directly.
    ports:
      - "127.0.0.1:3000:3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

  # Self-hosted visitor analytics. Pageviews, referrers, countries, devices,
  # bounce rate, avg session. Data lives in umami-db (below) — never leaves
  # this VPS. Dashboard served by Caddy at https://analytics.icut.pk.
  #
  # Same-origin /umami was attempted but requires building Umami from source
  # with BASE_PATH as a build arg, which in turn hits a Prisma/Alpine
  # libssl1.1 incompatibility. The published image works cleanly — pairing
  # it with a subdomain (one DNS A record) is the shortest maintainable path.
  umami:
    image: ghcr.io/umami-software/umami:postgresql-v2.14.0
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://umami:${UMAMI_DB_PASSWORD}@umami-db:5432/umami
      DATABASE_TYPE: postgresql
      APP_SECRET: ${UMAMI_APP_SECRET}
    depends_on:
      - umami-db

  umami-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: ${UMAMI_DB_PASSWORD}
    volumes:
      - umami_db_data:/var/lib/postgresql/data

secrets:
  nextsa_key:
    # TODO(ops): create /opt/brbr/secrets/nextsa_key.txt on the VPS with
    # `chmod 600`, containing the raw NEXT_SERVER_ACTIONS_ENCRYPTION_KEY.
    # This file must exist at build time (docker compose build).
    file: ./secrets/nextsa_key.txt

volumes:
  caddy_data:
  caddy_config:
  umami_db_data:
